<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="Contact White Water Rafting Company for reservations, inquiries, and exciting adventure bookings. Reach us by phone, email, or visit our location>
    <meta name=" author" content="Pelemo Ekundayo Gbenga">

    <title>Contact Us | White Water Rafting</title>

    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

    <!-- HEADER -->
    <header class="site-header">
        <img src="images/logo.png" alt="Rafting Logo" class="logo">

        <nav>
            <ul class="navigation">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <!-- MAIN -->
    <main>

        <!-- COMPANY INFO -->
        <section class="company-info">
            <h1>White Water Rafting Company</h1>
            <p>123 Main River Street</p>
            <p>Kolob, California</p>
            <p>+1 999 999 9999</p>
            <p>info@whitewater.com</p>
        </section>

        <!-- CONTACT + MAP -->
        <section class="contact-grid">

            <!-- MAP -->
            <div class="map">
                <iframe src="https://www.google.com/maps?q=California&output=embed"></iframe>
            </div>

            <!-- FORM -->
            <form class="contact-form">

                <!-- NAME -->
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Placeholder" required>

                <!-- EMAIL -->
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Placeholder" required>

                <!-- PURPOSE -->
                <fieldset>
                    <legend>Message Purpose</legend>

                    <label for="general">
                        <input type="radio" id="general" name="purpose" value="general">
                        General Inquiry
                    </label>

                    <label for="reservation">
                        <input type="radio" id="reservation" name="purpose" value="reservation">
                        Reservation Question
                    </label>

                    <label for="suggestion">
                        <input type="radio" id="suggestion" name="purpose" value="suggestion">
                        Website Suggestion
                    </label>
                </fieldset>

                <!-- MESSAGE -->
                <label for="message">Message</label>
                <textarea id="message" name="message" placeholder="Type here"></textarea>

                <!-- CHECKBOX -->
                <label for="subscribe" class="checkbox">
                    <input type="checkbox" id="subscribe" name="subscribe">
                    Please subscribe me to the monthly newsletter
                </label>

                <!-- SUBMIT -->
                <button type="submit">Get in Touch!</button>

            </form>

        </section>

        <!-- EMPLOYEES -->
        <section class="employees">

            <h2>We Are Here to Serve You</h2>

            <div class="employee-gallery">

                <figure>
                    <img src="images/employee1.jpg"
                      alt="Professional rafting guide assisting clients">
                    <figcaption>John Micheal</figcaption>
                    <figcaption>Lead Guide</figcaption>
                </figure>

                <figure>
                    <img src="images/employee2.jpg"
                      alt="Professional rafting guide assisting clients">
                    <figcaption>Janet Joe</figcaption>
                    <figcaption>Safety Instructor</figcaption>
                </figure>

                <figure>
                    <img src="images/employee3.jpg"
                      alt="Professional rafting guide assisting clients">
                    <figcaption>Ziram Susan</figcaption>
                    <figcaption>Operations Manager</figcaption>
                </figure>

            </div>

        </section>

    </main>

    <!-- FOOTER -->
    <footer>
        <p>© 2026 White Water Rafting | Pelemo Ekundayo Gbenga</p>

        <nav class="socialmedia">
            <a href="#"><img src="images/facebook.jpg" alt="Facebook"></a>
            <a href="#"><img src="images/linkedin.jpg" alt="LinkedIn"></a>
            <a href="#"><img src="images/instagram.jpg" alt="Instagram"></a>
        </nav>
    </footer>

</body>

</html>
